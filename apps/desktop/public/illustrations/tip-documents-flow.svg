<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="대화에서 HWPX 문서까지">
  <defs>
    <style>
      .panel{fill:#f6f8f5;stroke:#e3e8e0;stroke-width:1.5;}
      .ink{stroke:#2b2f2a;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
      .accent{fill:#3d7a4f;}
      .accentline{stroke:#3d7a4f;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
      .txt{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:11px;fill:#2b2f2a;}
      .txtsub{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:10px;fill:#8a948a;}
      .badge{font-family:'Malgun Gothic',sans-serif;font-size:9px;fill:#ffffff;}
    </style>
  </defs>
  <rect class="panel" x="14" y="30" width="80" height="70" rx="12"/>
  <path class="ink" d="M26 48 h44 M26 60 h56 M26 72 h36"/>
  <text class="txtsub" x="26" y="92">업무대화</text>
  <path class="accentline" d="M100 65 h22 M114 57 l10 8 -10 8"/>
  <rect class="panel" x="128" y="30" width="80" height="70" rx="12"/>
  <text class="txt" x="140" y="50">□ 요약</text>
  <text class="txt" x="146" y="66">◦ 항목</text>
  <text class="txt" x="152" y="82">- 세부</text>
  <text class="txtsub" x="140" y="94"> </text>
  <path class="accentline" d="M214 65 h22 M228 57 l10 8 -10 8"/>
  <rect x="242" y="26" width="62" height="78" rx="8" fill="#ffffff" stroke="#2b2f2a" stroke-width="2"/>
  <path d="M242 26 h42 l20 20 v58 h-62 z" fill="#ffffff" stroke="none"/>
  <path class="ink" d="M284 26 l20 20 h-20 z"/>
  <path class="ink" d="M252 58 h42 M252 68 h42 M252 78 h30"/>
  <rect class="accent" x="252" y="88" width="34" height="12" rx="6"/>
  <text class="badge" x="258" y="97">HWPX</text>
  <text class="txt" x="16" y="140">대화 → 구조 검토 → 미리보기 → 한글 문서.</text>
  <text class="txtsub" x="16" y="158">생성 전 구조를 직접 고칠 수 있고, 미리보기가 곧 최종입니다.</text>
</svg>
