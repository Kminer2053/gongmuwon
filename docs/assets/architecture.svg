<svg viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="로컬 AI에이전트 워크플레이스 아키텍처" font-family="'Segoe UI','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arwl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="878" height="398" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Windows / Tauri boundary -->
  <rect x="28" y="52" width="824" height="150" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="46" y="42" font-size="15" font-weight="700" fill="#0f172a">Windows 데스크톱 · Tauri 2 <tspan fill="#64748b" font-weight="500" font-size="13">(WebView2)</tspan></text>

  <!-- React UI -->
  <g filter="url(#sh)"><rect x="52" y="80" width="212" height="94" rx="12" fill="#eef9ff" stroke="#38bdf8" stroke-width="2"/></g>
  <text x="158" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#0c4a6e">React 19 UI</text>
  <text x="158" y="134" text-anchor="middle" font-size="11.5" fill="#475569">업무대화 · 일정 · 문서작성</text>
  <text x="158" y="151" text-anchor="middle" font-size="11.5" fill="#475569">지식폴더 · 실행기록 · 환경설정</text>

  <path d="M264,127 L344,127" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="304" y="119" text-anchor="middle" font-size="11" fill="#64748b">HTTP</text>

  <!-- FastAPI sidecar -->
  <g filter="url(#sh)"><rect x="350" y="80" width="222" height="94" rx="12" fill="#e7f6f4" stroke="#0d9488" stroke-width="2"/></g>
  <text x="461" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">FastAPI 사이드카</text>
  <text x="461" y="134" text-anchor="middle" font-size="11.5" fill="#475569">Python 3.11 · 단일 프로세스</text>
  <text x="461" y="151" text-anchor="middle" font-size="11.5" fill="#475569">업무 로직 · 색인 · 문서생성</text>

  <path d="M572,127 L636,127" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#arw)"/>

  <!-- SQLite -->
  <g filter="url(#sh)"><rect x="640" y="80" width="176" height="94" rx="12" fill="#eaf2fc" stroke="#2563eb" stroke-width="2"/></g>
  <text x="728" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">SQLite</text>
  <text x="728" y="138" text-anchor="middle" font-size="11.5" fill="#475569">FTS5 · 전부 로컬</text>

  <!-- services band -->
  <text x="46" y="233" font-size="13" font-weight="700" fill="#334155">로컬 런타임 · 데이터 <tspan fill="#94a3b8" font-weight="500">— 사이드카가 호출</tspan></text>

  <!-- fan-out arrows from sidecar -->
  <path d="M418,174 C398,212 232,214 178,244" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arwl)"/>
  <path d="M461,174 L461,244" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arwl)"/>
  <path d="M505,174 C525,212 640,214 690,244" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#arwl)"/>

  <!-- Ollama -->
  <g filter="url(#sh)"><rect x="52" y="246" width="234" height="76" rx="12" fill="#f1ecfb" stroke="#7c3aed" stroke-width="2"/></g>
  <text x="169" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#5b21b6">Ollama</text>
  <text x="169" y="297" text-anchor="middle" font-size="11.5" fill="#475569">gemma-4 E2B · 로컬 LLM</text>

  <!-- kordoc -->
  <g filter="url(#sh)"><rect x="322" y="246" width="214" height="76" rx="12" fill="#fdf1e3" stroke="#ea7317" stroke-width="2"/></g>
  <text x="429" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">kordoc</text>
  <text x="429" y="297" text-anchor="middle" font-size="11.5" fill="#475569">.hwp / .hwpx 파싱</text>

  <!-- 지식위키 -->
  <g filter="url(#sh)"><rect x="572" y="246" width="244" height="76" rx="12" fill="#eaf6ec" stroke="#16a34a" stroke-width="2"/></g>
  <text x="694" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">지식위키</text>
  <text x="694" y="297" text-anchor="middle" font-size="11.5" fill="#475569">md 파생 + FTS5 색인</text>

  <!-- local-first banner -->
  <rect x="28" y="346" width="824" height="38" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" font-size="12.5" font-weight="600" fill="#065f46">로컬 우선 · 폐쇄망 완전 오프라인 — 모든 데이터는 내 PC(%LOCALAPPDATA%)에만 저장</text>
</svg>
